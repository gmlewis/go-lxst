name: Bump Version

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Check for skip
        id: check
        run: |
          if git log -1 --pretty=format:'%an' | grep -q 'github-actions'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump minor version
        if: steps.check.outputs.skip != 'true'
        run: |
          current=$(grep 'const VERSION' lxst/version.go | sed 's/.*"\(.*\)".*/\1/')
          major=$(echo "$current" | cut -d. -f1)
          minor=$(echo "$current" | cut -d. -f2)
          new_minor=$((minor + 1))
          new_version="$major.$new_minor.0"
          sed -i "s/const VERSION = \".*\"/const VERSION = \"$new_version\"/" lxst/version.go
          echo "NEW_VERSION=$new_version" >> "$GITHUB_ENV"

      - name: Commit and push
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lxst/version.go
          git commit -m "Bump version to ${{ env.NEW_VERSION }} [skip ci]"
          git push

      - name: Create and push tag
        if: steps.check.outputs.skip != 'true'
        run: |
          git tag "v${{ env.NEW_VERSION }}"
          git push origin "v${{ env.NEW_VERSION }}"
